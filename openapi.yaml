info:
  title: domy-api
  description: API do app doméstico gamificado
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    RegisterDto:
      type: object
      properties:
        name:
          type: string
          example: João da Silva
          description: Nome completo do usuário
        email:
          type: string
          format: email
          example: usuario@example.com
          description: E-mail do usuário
        password:
          type: string
          minLength: 6
          example: Senha123
          description: Senha do usuário (mínimo 6 caracteres)
        inviteToken:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
          description: Token de convite opcional
      required:
        - name
        - email
        - password
    LoginDto:
      type: object
      properties:
        email:
          type: string
          format: email
          example: usuario@example.com
          description: E-mail do usuário
        password:
          type: string
          minLength: 6
          example: Senha123
          description: Senha de acesso
      required:
        - email
        - password
    AuthUserDto:
      type: object
      properties:
        roles:
          type: array
          items:
            type: string
            enum:
              - member
              - admin
          description: Roles do usuário
        level:
          enum:
            - Bronze
            - Prata
            - Ouro
            - Diamante
          type: string
          description: Nível atual do membro
        id:
          type: string
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        pointsBalance:
          type: number
        currentStreak:
          type: number
        longestStreak:
          type: number
        isActive:
          type: boolean
      required:
        - roles
        - level
        - id
        - email
        - name
        - avatarUrl
        - pointsBalance
        - currentStreak
        - longestStreak
        - isActive
    AuthResponseDto:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AuthUserDto'
        accessToken:
          type: string
        refreshToken:
          type: string
      required:
        - user
        - accessToken
        - refreshToken
    RefreshTokenDto:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 10
      required:
        - refreshToken
    AdjustPointsDto:
      type: object
      properties:
        amount:
          type: number
        description:
          type: string
          minLength: 1
          maxLength: 500
      required:
        - amount
        - description
    UpdateUserDto:
      type: object
      properties:
        roles:
          minItems: 1
          type: array
          items:
            type: string
            enum:
              - member
              - admin
