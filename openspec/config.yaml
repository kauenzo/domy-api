schema: spec-driven

context: |
  Linguagem padrão dos artefatos: pt-BR para specs, documentação e comentários.
  Código e identificadores devem permanecer em inglês. 

  ## Projeto
  App doméstico de tarefas gamificado. Admin cria tarefas; membros completam, acumulam pontos e resgatam recompensas.

  ## Stack
  - Runtime: Node.js 22 LTS
  - Framework: NestJS 10 · TypeScript 5 strict
  - Banco: PostgreSQL 16 · TypeORM · snake_case nas colunas · UUID PKs · soft delete via deleted_at
  - Auth: OAuth Google · JWT (access 15min + refresh 30d em tabela refresh_tokens)
  - Jobs: @nestjs/schedule (cron nativo)
  - Validação: class-validator + class-transformer (DTOs)

  ## Convenções de código
  - Módulos: src/modules/<modulo>/ com service, controller, module e dto/
  - Entities: src/database/entities/, uma por tabela
  - PKs: @PrimaryGeneratedColumn('uuid') — via BaseEntity abstrata
  - Soft delete: @DeleteDateColumn() — via SoftDeleteBaseEntity abstrata
  - Enums TypeScript para: status, type, difficulty, recurrence_type, level
  - Guards em src/common/guards/: JwtAuthGuard, RolesGuard, AdminGuard
  - Decorators em src/common/decorators/: @Roles(), @CurrentUser()
  - Commits: Conventional Commits (feat:, fix:, chore:)

  ## Estrutura de pastas
  src/
    config/           # database.config.ts · jwt.config.ts
    common/           # guards · decorators · interceptors · pipes
    database/
      entities/       # BaseEntity e SoftDeleteBaseEntity abstratas; uma entity por tabela
      migrations/
    modules/
      auth/           # fluxo membro (Google OAuth + JWT)
      admin/
        auth/         # fluxo admin (valida role admin)
        tasks/        # templates + instâncias (admin)
        categories/
        tags/
        rewards/
        redemptions/
        invites/
        dashboard/
      tasks/          # visualização + execução (membro)
      rewards/        # vitrine + resgate (membro)
      points/         # saldo + histórico (membro)
      notifications/
      users/          # perfil (membro)
      gamification/   # streak · níveis · bônus
    jobs/             # generate-instances · process-overdue · resume-paused-tasks

  ## Modelo de dados (tabelas)
  - users: id, google_id, name, email, avatar_url, roles[], points_balance, current_streak, longest_streak, level, is_active, deleted_at
  - refresh_tokens: id, user_id, token_hash, expires_at, revoked_at
  - invites: id, token (uuid), created_by, used_by, expires_at (+48h), used_at
  - categories: id, name, icon, color, deleted_at
  - tags: id, name, color, deleted_at
  - task_templates: id, title, description, cover_image_url, category_id, assigned_to, difficulty (easy/medium/hard/epic), base_points, points_override, recurrence_type, recurrence_config (jsonb), deadline_type, deadline_value, penalty_points, is_paused, paused_until, deleted_at
  - task_template_tags: template_id, tag_id
  - task_instances: id, template_id, assigned_to, scheduled_date, deadline_at, status (pending/in_progress/done/overdue/skipped), points_earned, points_penalty, completed_at, override_*, is_exception, deleted_at
  - point_transactions: id, user_id, amount, type (task_completion/streak_bonus/penalty/redemption_debit/redemption_refund/manual_adjustment), reference_id, description
  - rewards: id, title, description, cover_image_url, points_cost, stock_limit, stock_used, cooldown_days, is_active, deleted_at
  - redemptions: id, user_id, reward_id, points_cost, status (pending/approved/rejected), reviewed_by, reviewed_at, rejection_reason
  - notifications: id, user_id, type (redemption_approved/rejected/task_overdue/streak_milestone/level_up/general), title, body, reference_id, is_read

  ## Regras de negócio essenciais
  Pontos: base_points = difficulty × 10 (easy=1, medium=2, hard=3, epic=5); points_override substitui se preenchido.
  Streak: +1 ao concluir TODAS as tarefas do dia. Multiplicadores: 3-6d=+10%, 7-13d=+25%, 14-29d=+50%, 30+d=+100%.
  Níveis: Bronze 0-499, Prata 500-1999, Ouro 2000-4999, Diamante 5000+ (sobre total histórico positivo).
  Resgates: pontos debitados ao solicitar; reembolsados ao rejeitar. Validações: saldo, estoque, cooldown.
  Jobs cron: 00:01 gera instâncias do dia seguinte; 00:05 marca overdue + penalidades + streak; 00:10 retoma pausados.
  Ao criar template: gera instâncias dos próximos 7 dias imediatamente.

rules:
  proposal:
    - Referencie a fase do ROADMAP correspondente e suas dependências
    - Inclua a lista de endpoints que serão implementados
    - Mantenha foco no escopo da fase — não antecipe fases futuras
  design:
    - Siga as convenções de módulos NestJS e entities TypeORM do contexto acima
    - Especifique DTOs com class-validator para cada endpoint
    - Indique quais guards serão usados em cada rota
    - Não crie testes automatizados, crie .md com recomendação de testes manuais
  tasks:
    - Quebre em tarefas de no máximo 2h cada
    - Ordene pelas dependências (entities → service → controller → module → DTOs)
    - Inclua tarefa de registrar o módulo no AppModule
